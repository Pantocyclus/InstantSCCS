name: Build instantsccs

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
  workflow_dispatch:

env:
  # Default version of Node.js for jobs
  node-version: "24"

jobs:
  lint-all:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout
        uses: actions/checkout@v5

      # Setup Nodejs
      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.node-version }}
          package-manager-cache: false

      # Enable Corepack
      - name: Enable Corepack
        run: corepack enable

      # Manually set up the cache AFTER enabling corepack
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - run: yarn install --immutable
      - run: yarn run lint

  build-push:
    runs-on: ubuntu-latest
    needs: [lint-all]
    if: github.ref == 'refs/heads/main'

    steps:
      # Checkout source code
      - name: Checkout
        uses: actions/checkout@v5

      # Setup Nodejs
      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.node-version }}
          package-manager-cache: false

      # Enable Corepack
      - name: Enable Corepack
        run: corepack enable

      # Manually set up the cache AFTER enabling corepack
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install build dependencies
        run: yarn install --immutable

      - run: |
          yarn build
          mkdir BUILD
          cp -r KoLmafia/scripts BUILD/scripts
          cp -r KoLmafia/relay BUILD/relay
          cp -r KoLmafia/dependencies.txt BUILD/dependencies.txt
          cp -r README.md BUILD/README.md

      # Synchronise & push BUILD directory to release branch
      - name: Configure Git information
        run: |
          git config --global user.name "Build Script"
          git config --global user.email "<>"

      - name: Synchronize & push into release branch
        run: |
          git fetch --all          
          echo "Switching into release"
          git stash && git stash clear
          git switch release

          # Push build into the release branch
          shopt -s extglob
          rm -rf !(BUILD)
          mv BUILD/scripts scripts
          mv BUILD/relay relay
          mv BUILD/dependencies.txt dependencies.txt
          mv BUILD/README.md README.md
          rm -rf BUILD
          git add scripts relay dependencies.txt README.md

          # Skip push if nothing changed
          if ! git diff --cached --exit-code --quiet; then
            echo "Commiting new build."
            git commit -m "Automated build"
            git push -f origin release
          else
            echo "Nothing new to commit. Skipping push."
          fi
